<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <title>{% block title %}Diário de Carga{% endblock %}</title>

</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center mx-auto"
               href="{{ url_for('pagina_dashboard') }}">

                <img src="{{ url_for('static', filename='images/logo.png') }}"
                     alt="Logo Diário de Carga"
                     width="150" height="150"
                     class="me-2">

                Diário de Carga
            </a>

            {% if session.logado %}
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="navbar-text me-3">
                        Olá, {{ session.usuario_nome }}
                    </span>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light" href="{{ url_for('pagina_logout') }}">Sair</a>
                </li>
            </ul>
            {% endif %}
        </div>
    </nav>

    <main class="container flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto py-3 border-top">
        <div class="container text-center">
            <span class="text-body-secondary">
                &copy; <span id="current-year"></span> Diário de Carga. Todos os direitos reservados.
            </span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>

</body>
</html>
